server:
  port: 8082

spring:
  application:
    name: smart-cs-knowledge

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  datasource:
    url: jdbc:mysql://mysql:3306/smart_cs?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: root
    password: ${MYSQL_ROOT_PASSWORD:liu317228}
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: redis
      port: 6379

  cloud:
    nacos:
      discovery:
        enabled: false

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

# MinIO（Docker 容器名）
minio:
  endpoint: http://minio:9000
  access-key: ${MINIO_ACCESS_KEY:lsc}
  secret-key: ${MINIO_SECRET_KEY:liu317228}
  bucket: smart-cs-docs

# SiliconFlow API
siliconflow:
  embedding-api-key: ${SILICONFLOW_API_KEY}
  embedding-base-url: https://api.siliconflow.cn/v1
  embedding-model: BAAI/bge-m3
  chat-api-key: ${SILICONFLOW_API_KEY}
  chat-base-url: https://api.siliconflow.cn/v1
  chat-model: Qwen/Qwen2.5-7B-Instruct

logging:
  level:
    com.smartcs: info

# pgvector 向量数据库配置
vector:
  db:
    url: jdbc:postgresql://pgvector:5432/smart_cs_vector
    user: liu317228
    password: ${MYSQL_ROOT_PASSWORD:liu317228}

# Actuator 暴露 Prometheus 指标端点
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
