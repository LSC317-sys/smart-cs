logging:
  level:
    com.smartcs: debug
    org.springframework.web: info
    org.springframework.data.redis: warn
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %highlight(%-5level) %cyan(%logger{36}) - %msg%n"
  file:
    name: logs/smart-cs-chat.log
    max-size: 10MB
    max-history: 7

