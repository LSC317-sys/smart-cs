server:
  port: 8080

spring:
  application:
    name: smart-cs-gateway
  main:
    web-application-type: reactive
  datasource:
    url: jdbc:mysql://localhost:3306/smart_cs?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root
  data:
    redis:
      host: localhost
      port: 6379

cloud:
  gateway:
    routes:
      - id: chat-service
        uri: http://localhost:8081
        predicates:
          - Path=/chat/**

logging:
  level:
    root: info
    org.springframework.cloud.gateway: debug
    com.smartcs: debug