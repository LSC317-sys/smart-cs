services:
  # ========================
  # 基础设施
  # ========================
  mysql:
    image: mysql:8.0
    container_name: smart-cs-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-liu317228}
      MYSQL_CHARSET: utf8mb4
      TZ: Asia/Shanghai
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init-sql:/docker-entrypoint-initdb.d
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --innodb-buffer-pool-size=256M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smart-cs-net

  redis:
    image: redis:7-alpine
    container_name: smart-cs-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --appendfsync everysec
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smart-cs-net

  minio:
    image: minio/minio:latest
    container_name: smart-cs-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-lsc}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-liu317228}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smart-cs-net

  # ========================
  # pgvector 向量数据库（新增）
  # ========================
  pgvector:
    image: pgvector/pgvector:pg16
    container_name: smart-cs-pgvector
    restart: unless-stopped
    environment:
      POSTGRES_DB: smart_cs_vector
      POSTGRES_USER: liu317228
      POSTGRES_PASSWORD: liu317228
      TZ: Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data
      - ./init-sql/04-pgvector.sql:/docker-entrypoint-initdb.d/04-pgvector.sql:ro
    command: >
      postgres
      -c shared_preload_libraries=vector
      -c max_connections=200
      -c shared_buffers=128MB
      -c effective_cache_size=256MB
      -c maintenance_work_mem=64MB
      -c work_mem=16MB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U liu317228 -d smart_cs_vector"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smart-cs-net

  # ========================
  # 微服务
  # ========================
  gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        JAR_FILE: deployment/libs/smart-cs-gateway-1.0.0.jar
    container_name: smart-cs-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - chat.service.url=http://chat:8081
      - knowledge.service.url=http://knowledge:8082
      - user.service.url=http://user:8083
      - admin.service.url=http://admin:8084
      - CORS_ALLOWED_ORIGINS=http://121.199.172.24,http://localhost,http://127.0.0.1
      - MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE=health,info,prometheus,metrics
      - MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS=always
    depends_on:
      chat:
        condition: service_healthy
      knowledge:
        condition: service_healthy
      admin:
        condition: service_healthy
    networks:
      - smart-cs-net

  chat:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        JAR_FILE: deployment/libs/smart-cs-chat-1.0.0.jar
    container_name: smart-cs-chat
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/smart_cs?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_ROOT_PASSWORD:-liu317228}
      - SPRING_DATA_REDIS_HOST=redis
      - SILICONFLOW_API_KEY=${SILICONFLOW_API_KEY}
      - MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE=health,info,prometheus,metrics
      - MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS=always
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "8081"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      pgvector:
        condition: service_healthy
    networks:
      - smart-cs-net

  knowledge:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        JAR_FILE: deployment/libs/smart-cs-knowledge-1.0.0.jar
    container_name: smart-cs-knowledge
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/smart_cs?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_ROOT_PASSWORD:-liu317228}
      - SPRING_DATA_REDIS_HOST=redis
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-lsc}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-liu317228}
      - SILICONFLOW_API_KEY=${SILICONFLOW_API_KEY}
      - MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE=health,info,prometheus,metrics
      - MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS=always
      - VECTOR_DB_URL=jdbc:postgresql://pgvector:5432/smart_cs_vector
      - VECTOR_DB_USER=liu317228
      - VECTOR_DB_PASSWORD=liu317228
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "8082"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      pgvector:
        condition: service_healthy
    networks:
      - smart-cs-net

  user:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        JAR_FILE: deployment/libs/smart-cs-user-1.0.0.jar
    container_name: smart-cs-user
    restart: unless-stopped
    ports:
      - "8083:8083"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/smart_cs_user?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_ROOT_PASSWORD:-liu317228}
      - SPRING_DATA_REDIS_HOST=redis
      - MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE=health,info,prometheus,metrics
      - MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS=always
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "8083"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - smart-cs-net

  admin:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        JAR_FILE: deployment/libs/smart-cs-admin-1.0.0.jar
    container_name: smart-cs-admin
    restart: unless-stopped
    ports:
      - "8084:8084"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/smart_cs_admin?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_ROOT_PASSWORD:-liu317228}
      - SPRING_DATA_REDIS_HOST=redis
      - MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE=health,info,prometheus,metrics
      - MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS=always
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "8084"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - smart-cs-net

  # ========================
  # 前端
  # ========================
  frontend:
    image: nginx:alpine
    container_name: smart-cs-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ../smart-cs-frontend/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - gateway
    networks:
      - smart-cs-net

  # ========================
  # 监控栈（新增）
  # ========================
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: smart-cs-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - smart-cs-net

  grafana:
    image: grafana/grafana:10.4.0
    container_name: smart-cs-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - smart-cs-net

  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: smart-cs-node-exporter
    restart: unless-stopped
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    ports:
      - "9100:9100"
    networks:
      - smart-cs-net

# ========================
# 数据卷
# ========================
volumes:
  mysql_data:
  redis_data:
  minio_data:
  pgvector_data:
  prometheus_data:
  grafana_data:

# ========================
# 网络
# ========================
networks:
  smart-cs-net:
    driver: bridge